<header class="d-flex flex-column flex-md-row align-items-center justify-content-between
    border-bottom fixed-top mb-2 px-5 py-3 bg-white">

  <img src="/assets/images/logo.png" style="max-height: 70px;" alt="logo" routerLink="/" class="logo">

  <nav class="my-2 mt-md-0 mr-md-3 text-uppercase" style="font-size: larger;">
    <a class="me-3 py-2" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
    <a class="me-3 py-2" routerLink="/shop" routerLinkActive="active">Shop</a>
    <a class="me-3 py-2" routerLink="/test-errors" routerLinkActive="active">Errors</a>
  </nav>
  <div class="d-flex align-items-center">
    <a routerLink="/basket" class="position-relative">
      <i class="fa fa-shopping-cart fa-2x text-dark me-5 py-2"></i>
      <div *ngIf="(basket$ | async) as basket" class="cart-no">{{basket.basketItems.length}}</div>
    </a>
    <ng-container *ngIf="(currentUser$ | async) === null">
      <a routerLink="/account/login" class="me-3 py-2 btn btn-outline-secondary">Login</a>
      <a routerLink="/account/register" class="me-3 py-2 btn btn-outline-secondary">Sign up</a>
    </ng-container>
    <ng-container *ngIf="(currentUser$ | async) !== null">

      <div class="dropdown">
        <a class="btn btn-secondary dropdown-toggle" href="#" role="button" id="dropdownMenuLink" data-bs-toggle="dropdown" aria-expanded="false">
          <a href="#">Welcome {{(currentUser$ | async).displayName}}</a>
        </a>

        <div class="dropdown-menu" aria-labelledby="dropdownMenuLink">
          <a routerLink="/basket" class="dropdown-item"><i class="fa fa-shopping-cart me-3"></i>View Basket</a>
          <a routerLink="/orders" class="dropdown-item"><i class="fa fa-history me-3"></i>View Orders</a>
          <div class="dropdown-divider"></div>
          <a (click)="logout()" class="dropdown-item"><i class="fa fa-sign-out me-3"></i>Logout</a>
        </div>
      </div>
    </ng-container>

  </div>

</header>
